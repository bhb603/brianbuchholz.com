baseURL = "https://www.brianbuchholz.com"
languageCode = "en-us"
title = "~/notes"
theme = "cactus"
copyright = "Brian H. Buchholz" # cactus will use title if copyright is not set
# disqusShortname = "example" # Used when comments is enabled. Cactus will use site title if not set
# googleAnalytics = "UA-1234-5"


# summaryLength = 2

# Main menu which appears below site header.
[[menu.main]]
name = "home"
url = "/"
weight = 1

[[menu.main]]
name = "notes"
url = "/posts"
weight = 2

[[menu.main]]
name = "tags"
url = "/tags"
weight = 3

[markup]
[markup.tableOfContents]
endLevel = 4
ordered = false
startLevel = 2
[markup.highlight]
codeFences = true
guessSyntax = false
hl_Lines = ""
lineNoStart = 1
lineNos = false
lineNumbersInTable = false
noClasses = true
style = "dracula"
tabWidth = 4

[params]

colortheme = "light" # dark, light, white, or classic
rss = true # generate rss feed. default value is false
googleAnalyticsAsync = true # use asynchronous tracking. Synchronous tracking by default
showAllPostsArchive = false # default

# Home page settings
description = ""
mainSection = "posts" # your main section
mainSectionTitle = "notes"
showAllPostsOnHomePage = false # default
postsOnHomePage = 5 # this option will be ignored if showAllPostsOnHomePage is set to true
tagsOverview = false # show tags overview by default.
showProjectsList = false # show projects list by default (if projects data file exists).
projectsUrl = "https://github.com/bhb603" # title link for projects list

# https://gohugo.io/functions/format/#hugo-date-and-time-templating-reference
dateFormat = "Jan 2 2006" # default

# Post page settings
show_updated = true # default
showReadTime = true # default

[params.comments]
enabled = false # default
engine = "disqus" # more supported engines will be added.

# the value of name should be an valid font awesome icon name (brands type)
# https://fontawesome.com/icons?d=gallery&s=brands
[[params.social]]
  name = "github"
  link = "https://github.com/bhb603"
[[params.social]]
  name = "linkedin"
  link = "https://www.linkedin.com/in/buchholz1"
[[params.social]]
  name = "twitter"
  link = "https://twitter.com/BrianHBuchholz"  # no need for "mailto:" in the head
